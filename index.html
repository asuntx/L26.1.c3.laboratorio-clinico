<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz virtual</title>
</head>

<body>

  <section id="Quiz" style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h5 id="quiz_lblQuiz">Procesar Quiz</h5>
    <div>
      <label>Cédula:
        <input type="number" id="quiz_inCedula" placeholder="Cédula del estudiante">
      </label>
    </div>
    <div>
      <label>Nombre:
        <input type="text" id="quiz_inNombre" placeholder="Nombre del estudiante">
      </label>
    </div>
    <div>
      <label>¿Cuánto es 5 x 8?:
        <input type="number" id="quiz_inRespuesta1" placeholder="Respuesta 1">
      </label>
    </div>
    <div>
      <label>¿Qué resulta de combinar azul y amarillo?:
        <select id="quiz_inRespuesta2">
          <option value="negro">Negro</option>
          <option value="verde">Verde</option>
          <option value="plateado">Plateado</option>
        </select>
      </label>
    </div>
    <br>
    <button id="quiz_btEnviar">Enviar</button>
  </section>

  <script type="module">
    import Cl_cQuiz from "./dist/controllers/Cl_cQuiz.js";

    // Importamos SOLO las vistas planas
    import Cl_vQuiz from "./dist/views/Cl_vQuiz.js";

    // 1. Instanciamos las vistas
    const vistaQuiz = new Cl_vQuiz();

    // 2. Inyectamos las vistas en los controladores (Â¡La magia ocurre aquÃ­!)
    new Cl_cQuiz(vistaQuiz);
  </script>
</body>

</html>
