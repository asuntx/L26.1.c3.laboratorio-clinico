<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curso virtual</title>
</head>

<body>
  <section id="curso" style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h2>CURSO: Administrar QUIZ</h2>
    <button id="curso_btVerEntregas">Ver entregas</button>
    <button id="curso_btEstudiantes">Estudiantes</button>
  </section>
  <section id="entregas" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h2>Entregas del QUIZ</h2>
    <ol>
      <li id="entregas_liPregunta1">¿Cuánto es 5 x 8?</li>
      <li id="entregas_liPregunta2">¿Qué color da azul con amarillo?</li>
    </ol>
    <div>
      <table style="text-align: center;">
        <thead>
          <tr>
            <th>Cedula</th>
            <th>Nombre</th>
            <th>Resp.1</th>
            <th>Resp.2</th>
          </tr>
        </thead>
        <tbody id="entregas_tblRegistros"></tbody>
      </table>
    </div>
    <br>
    <button id="entregas_btRecargar">Recargar</button>
    <label>
      <input id="entregas_chkSoloCorrectos" type="checkbox">Solo correctos
    </label>
    <br>
    <button id="entregas_btVolver" style="margin-top: 10px;">Volver</button>
  </section>
  <section id="estudiantes" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h2>Estudiantes</h2>
    <div style="display: flex; flex-direction: column;">
      <label>Cedula:
        <input type="number" id="estudiantes_inCedula" placeholder="Cedula del estudiante">
      </label>
      <label>Nombre:
        <input type="text" id="estudiantes_inNombre" placeholder="Nombre del estudiante">
      </label>
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button id="estudiantes_btAgregar">Agregar</button>
        <button id="estudiantes_btModificar">Modificar</button>
        <button id="estudiantes_btEliminar">Eliminar</button>
      </div>
    </div>
    <table style="text-align: center;margin-top: 10px; border: 1px solid #ccc;">
      <thead>
        <tr>
          <th>Cedula</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody id="estudiantes_tblRegistros"></tbody>
    </table>
    <br>
    <button id="estudiantes_btVolver" style="margin-top: 10px;">Volver</button>
  </section>

  <script type="module">
    import Cl_cCurso from "./dist/controllers/Cl_cCurso.js";
    import Cl_vCurso from "./dist/views/Cl_vCurso.js";

    const vCurso = new Cl_vCurso();

    new Cl_cCurso({ vista: vCurso });
  </script>
</body>

</html>
